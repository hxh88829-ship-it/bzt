syntax = "proto3";

package helloworld.v1;

import "google/api/annotations.proto";

option go_package = "valueguard/api/helloworld/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.helloworld.v1";
option java_outer_classname = "HelloworldProtoV1";

// The greeting service definition.
service Greeter {
  // Sends a greeting
  rpc SayHello (HelloRequest) returns (HelloReply) {
    option (google.api.http) = {
      get: "/helloworld/{name}/{value}"
    };
  }
  rpc BindWallet (BindWalletRequest) returns (BindWalletReply) {
    option (google.api.http) = {
      post: "/v1/bindWallet"
      body: "*"
    };
  }

  rpc GetLoginMessage (GetLoginMessageRequest) returns (GetLoginMessageReply) {
    option (google.api.http) = {
      post: "/v1/getLoginMessage"
      body: "*"
    };
  }
  rpc LoginWithWallet (LoginRequest) returns (LoginReply) {
    option (google.api.http) = {
      post: "/v1/loginWithWallet"
      body: "*"
    };
  }
  rpc WalletBalance (WalletBalanceRequest) returns (WalletBalanceReply) {
    option (google.api.http) = {
      post: "/v1/walletBalance"
      body: "*"
    };
  }
  rpc MarketCondition (MarketConditionRequest) returns (MarketConditionReply) {
    option (google.api.http) = {
      post: "/v1/marketCondition"
      body: "*"
    };
  }
  rpc OpenOrder (OpenOrderRequest) returns (OpenOrderReply) {
    option (google.api.http) = {
      post: "/v1/openOrder"
      body: "*"
    };
  }
  rpc CloseOrder (CloseOrderRequest) returns (CloseOrderReply) {
    option (google.api.http) = {
      post: "/v1/closeOrder"
      body: "*"
    };
  }
}

// The request message containing the user's name.
message HelloRequest {
  string name = 1;
  uint64 value = 2;
}

// The response message containing the greetings
message HelloReply {
  string message = 1;
}

message GetLoginMessageRequest {
  string address = 1;
}

// The response message containing the greetings
message GetLoginMessageReply {
  string metadata = 1;
  string hash = 2;
}
message BindWalletRequest {
  string address = 1;
  string email = 2;
  string name = 3;
}

// The response message containing the greetings
message BindWalletReply {
  string uid= 1;
  string metadata = 2;
  string hash = 3;
}

message LoginRequest {
  string uid = 1;
  string signature = 2;
  string address = 3;
}

// The response message containing the greetings
message LoginReply {
  string token = 1;
}

message WalletBalanceRequest {
  string address = 1;
}

message TokenBalance {
  string symbol = 1;
  string balance = 2;
}

message WalletBalanceReply {
  repeated TokenBalance tokens = 1;
}

message MarketConditionRequest {
  string symbol = 1;
  int64 start_time = 2;
  int64 end_time = 3;
}

message MarketPrice {
  string price = 1;
  uint64 time = 2;
}

message MarketConditionReply {
  repeated MarketPrice prices = 1;
}


message OpenOrderRequest {
  string address = 1;
  string amount = 2;
  uint64 timestamp = 3;
  string symbol = 4;
}

// The response message containing the greetings
message OpenOrderReply {
  string orderId = 1;
}

message CloseOrderRequest {
  string address = 1;
  uint64 timestamp = 2;
  string symbol = 3;
  string orderId = 4;
}

// The response message containing the greetings
message CloseOrderReply {
  string tx = 1;
}
