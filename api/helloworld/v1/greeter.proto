syntax = "proto3";

package helloworld.v1;

import "google/api/annotations.proto";

option go_package = "valueguard/api/helloworld/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.helloworld.v1";
option java_outer_classname = "HelloworldProtoV1";

// The greeting service definition.
service Greeter {
  // Sends a greeting
  rpc SayHello (HelloRequest) returns (HelloReply) {
    option (google.api.http) = {
      get: "/helloworld/{name}/{value}"
    };
  }
  rpc BindWallet (BindWalletRequest) returns (BindWalletReply) {
    option (google.api.http) = {
      post: "/v1/bindWallet"
      body: "*"
    };
  }

  rpc GetLoginMessage (GetLoginMessageRequest) returns (GetLoginMessageReply) {
    option (google.api.http) = {
      post: "/v1/getLoginMessage"
      body: "*"
    };
  }
  rpc LoginWithWallet (LoginRequest) returns (LoginReply) {
    option (google.api.http) = {
      post: "/v1/loginWithWallet"
      body: "*"
    };
  }
  rpc WalletBalance (WalletBalanceRequest) returns (WalletBalanceReply) {
    option (google.api.http) = {
      post: "/v1/walletBalance"
      body: "*"
    };
  }
  rpc MarketCondition (MarketConditionRequest) returns (MarketConditionReply) {
    option (google.api.http) = {
      post: "/v1/marketCondition"
      body: "*"
    };
  }
  rpc OpenOrder (OpenOrderRequest) returns (OpenOrderReply) {
    option (google.api.http) = {
      post: "/v1/openOrder"
      body: "*"
    };
  }
  rpc CloseOrder (CloseOrderRequest) returns (CloseOrderReply) {
    option (google.api.http) = {
      post: "/v1/closeOrder"
      body: "*"
    };
  }
  rpc GetAirdrop (GetAirdropRequest) returns (GetAirdropReply) {
    option (google.api.http) = {
      post: "/v1/getAirdrop"
      body: "*"
    };
  }
  rpc Health (HealthCheckRequest) returns (HealthCheckReply) {
    option (google.api.http) = {
      get: "/health"
    };
  }

  rpc OrderTrade (OrderTradeRequest) returns (OrderTradeReply) {
    option (google.api.http) = {
      post: "/v1/orderTrade"
      body: "*"
    };
  }

  rpc AirdropTrade (AirdropTradeRequest) returns (AirdropTradeReply) {
    option (google.api.http) = {
      post: "/v1/airdropTrade"
      body: "*"
    };
  }
  rpc BztDapp (BztDappRequest) returns (BztDappReply) {
    option (google.api.http) = {
      get: "/bzt/dapp"
    };
  }


  rpc DeployContract (DeployContractRequest) returns (DeployContractReply) {
    option (google.api.http) = {
      post: "/v1/deployContract"
      body: "*"
    };
  }

  rpc GetBztDetails (GetBztDetailsRequest) returns (GetBztDetailsReply) {
    option (google.api.http) = {
      post: "/v1/getBztDetails"
      body: "*"
    };
  }

  rpc GetBztVersion (GetBztVersionRequest) returns (GetBztVersionReply) {
    option (google.api.http) = {
      get: "/bzt/version"
    };
  }

  rpc GetConfigs (GetConfigsRequest) returns (GetConfigsReply) {
    option (google.api.http) = {
      post: "/v1/getConfigs"
      body: "*"
    };
  }

  rpc GetHistoricalPrice(GetHistoricalPriceRequest) returns (GetHistoricalPriceReply) {
    option (google.api.http) = {
      post: "/v1/getHistoricalPrice"
      body: "*"
    };
  }

  rpc GetKLineData(GetKLineDataRequest) returns (GetKLineDataReply) {
    option (google.api.http) = {
      post: "/v1/getKLineData"
      body: "*"
    };
  }

  rpc QueryKLineData(QueryKLineDataRequest) returns (QueryKLineDataReply) {
    option (google.api.http) = {
      post: "/v1/queryKLineData"
      body: "*"
    };
  }

  rpc ClaimsAirdrop(ClaimsAirdropRequest) returns (ClaimsAirdropReply) {
    option (google.api.http) = {
      post: "/v1/claimsAirdrop"
      body: "*"
    };
  }

  rpc IndexSwitch(IndexSwitchRequest) returns (IndexSwitchReply) {
    option (google.api.http) = {
      post: "/v1/indexSwitch"
      body: "*"
    };
  }

  rpc DeleteIndexSwitch(DeleteIndexSwitchRequest) returns (DeleteIndexSwitchReply) {
    option (google.api.http) = {
      post: "/v1/deleteIndexSwitch"
      body: "*"
    };
  }

}

// The request message containing the user's name.
message HelloRequest {
  string name = 1;
  uint64 value = 2;
}

// The response message containing the greetings
message HelloReply {
  string message = 1;
}

message GetLoginMessageRequest {
  string address = 1;
}

// The response message containing the greetings
message GetLoginMessageReply {
  string metadata = 1;
  string hash = 2;
}
message BindWalletRequest {
  string address = 1;
}

// The response message containing the greetings
message BindWalletReply {
  string uid= 1;
  string metadata = 2;
  string hash = 3;
}

message LoginRequest {
  string uid = 1;
  string signature = 2;
  string address = 3;
}

// The response message containing the greetings
message LoginReply {
  string token = 1;
}

message WalletBalanceRequest {
  string address = 1;
}

message TokenBalance {
  string symbol = 1;
  string balance = 2;
}

message WalletBalanceReply {
  repeated TokenBalance tokens = 1;
}

message MarketConditionRequest {
  string symbol = 1;
  uint64 start_time = 2;
  uint64 end_time = 3;
}

message MarketPrice {
  string price = 1;
  uint64 time = 2;
}

message MarketConditionReply {
  repeated MarketPrice prices = 1;
}


message OpenOrderRequest {
  string address = 1;
  uint64 timestamp = 2;
  string symbol = 3;
}

// The response message containing the greetings
message OpenOrderReply {
  string orderId = 1;
  uint64 status = 2;
}

message CloseOrderRequest {
  string address = 1;
  uint64 timestamp = 2;
  string orderId = 3;
}

// The response message containing the greetings
message CloseOrderReply {
  string tx = 1;
}

message GetAirdropRequest {
  string timestamp = 1;
}

// The response message containing the greetings
message GetAirdropReply {
  string status = 1;
  string value = 2;
  string txHash = 3;
  string orderId = 4;
  string claims = 5;
  string claimed = 6;
  string total = 7;
}

message HealthCheckRequest {}

message HealthCheckReply {
  string status = 1; // "ok" 或 "not ok"
}

message OrderTradeRequest {
  string address = 1;
  int64 page = 2;
  int64 pageSize = 3;
}

// The response message containing the greetings
message OrderTradeReply {
  repeated OrderDetails result = 1;
}

message OrderDetails {
  string orderId = 1;
  string symbol = 2;
  string openedPrice = 3;
  string closePrice = 4;
  string profitLoss = 5;
  string amount = 6;
  string usersAddr = 7;
  uint64 isClosed = 8;
  uint64 orderStartTime = 9;
  uint64 orderEndTime = 10;
  string openTxHash = 11;
  string closeTxHash = 12;
  string uid = 13;
}

message AirdropTradeRequest {
  string addr = 1;
  int64  page = 2;
  int64  size = 3;
}

// The response message containing the greetings
message AirdropTradeReply {
  repeated AirdropDetails result = 1;
}

message AirdropDetails {
  string usersAddr = 1;
  string amount = 2;
  string symbol = 3;
  string times = 4;
  string txHash = 5;
  string uid = 6;
  string orderId = 7;
  uint64 status = 8;
}

message BztDappRequest {}

message BztDappReply {
  int64 code = 1;
  string message = 2;
  repeated DataDetails data = 3;
}

message DataDetails {
  int64 appId = 1;
  string dappIcon = 2;
  string dappIntroduce = 3;
  string dappName = 4;
  string dappUrl = 5;
}

message DeployContractRequest {}

// The response message containing the greetings
message DeployContractReply {
  string txHash = 1;
}


message GetBztDetailsRequest {}

// The response message containing the greetings
message GetBztDetailsReply {
  string bztAddr = 1;
  string balance = 2;
  string dusdtToken = 3;
  string urlAddr = 4;
}

message GetBztVersionRequest {}

// The response message containing the greetings
message GetBztVersionReply {
  string version = 1;
  string build_time = 2;
}

message GetConfigsRequest {}

// The response message containing the greetings
message GetConfigsReply {
  uint64 chainId = 1;
  string bztContractAddress = 2;
  string dusdtContractAddress = 3;
}


message GetHistoricalPriceRequest {
  string symbol = 1;
  uint64 start_time = 2;
  uint64 end_time = 3;
  int64 page = 4;
  int64 size = 5;
}

message GetHistoricalPriceReply {
  repeated MarketPrice prices = 1;
}

message GetKLineDataRequest {
  string symbol = 1;
  string interval = 2;
  int64  step = 3;
  string types = 4;
}

message GetKLineDataReply {
  string result = 1;
}

message Kline {
  int64  openTime                 = 1;  // 开盘时间
  string openPrice                = 2;  // 开盘价
  string highPrice                = 3;  // 最高价
  string lowPrice                 = 4;  // 最低价
  string closePrice               = 5;  // 收盘价
  string volume                   = 6;  // 成交量
  int64  closeTime                = 7;  // 收盘时间
  string quoteAssetVolume         = 8;  // 成交额
  int32  numberOfTrades           = 9;  // 交易笔数
  string takerBuyBaseAssetVolume  = 10; // 主动买入成交量
  string takerBuyQuoteAssetVolume = 11; // 主动买入成交额
  string ignore                   = 12; // 保留字段
  string dataType                 = 13; // 数据类型
  string symbol                   = 14; // 币种
}

message QueryKLineDataRequest {
  string symbol = 1;
  string interval = 2;
  int64  page = 3;
  int64  size = 4;
}

message QueryKLineDataReply {
  repeated Kline result = 1;
}


message ClaimsAirdropRequest {
  string address = 1;
}

message ClaimsAirdropReply {
  string  claimed = 1;
  string  total = 2;
}

message IndexSwitchRequest {
  int64 val = 1;
}

message IndexSwitchReply {
  string  result = 1;
}

message DeleteIndexSwitchRequest {
  int64 val = 1;
  string collection = 2;
}

message DeleteIndexSwitchReply {
  string  result = 1;
}
