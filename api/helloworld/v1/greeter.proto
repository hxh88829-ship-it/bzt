syntax = "proto3";

package helloworld.v1;

import "google/api/annotations.proto";

option go_package = "valueguard/api/helloworld/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.helloworld.v1";
option java_outer_classname = "HelloworldProtoV1";

// The greeting service definition.
service Greeter {
  // Sends a greeting
  rpc SayHello (HelloRequest) returns (HelloReply) {
    option (google.api.http) = {
      get: "/helloworld/{name}/{value}"
    };
  }
  rpc BindWallet (BindWalletRequest) returns (BindWalletReply) {
    option (google.api.http) = {
      post: "/v1/bindWallet"
      body: "*"
    };
  }

  rpc GetLoginMessage (GetLoginMessageRequest) returns (GetLoginMessageReply) {
    option (google.api.http) = {
      post: "/v1/getLoginMessage"
      body: "*"
    };
  }
  rpc LoginWithWallet (LoginRequest) returns (LoginReply) {
    option (google.api.http) = {
      post: "/v1/loginWithWallet"
      body: "*"
    };
  }
  rpc WalletBalance (WalletBalanceRequest) returns (WalletBalanceReply) {
    option (google.api.http) = {
      post: "/v1/walletBalance"
      body: "*"
    };
  }
  rpc MarketCondition (MarketConditionRequest) returns (MarketConditionReply) {
    option (google.api.http) = {
      post: "/v1/marketCondition"
      body: "*"
    };
  }
  rpc OpenOrder (OpenOrderRequest) returns (OpenOrderReply) {
    option (google.api.http) = {
      post: "/v1/openOrder"
      body: "*"
    };
  }
  rpc CloseOrder (CloseOrderRequest) returns (CloseOrderReply) {
    option (google.api.http) = {
      post: "/v1/closeOrder"
      body: "*"
    };
  }
  rpc GetAirdrop (GetAirdropRequest) returns (GetAirdropReply) {
    option (google.api.http) = {
      post: "/v1/getAirdrop"
      body: "*"
    };
  }
  rpc Health (HealthCheckRequest) returns (HealthCheckReply) {
    option (google.api.http) = {
      get: "/health"
    };
  }

  rpc OrderTrade (OrderTradeRequest) returns (OrderTradeReply) {
    option (google.api.http) = {
      post: "/v1/orderTrade"
      body: "*"
    };
  }

  rpc AirdropTrade (AirdropTradeRequest) returns (AirdropTradeReply) {
    option (google.api.http) = {
      post: "/v1/airdropTrade"
      body: "*"
    };
  }
  rpc BztDapp (BztDappRequest) returns (BztDappReply) {
    option (google.api.http) = {
      get: "/bzt/dapp"
    };
  }


  rpc DeployContract (DeployContractRequest) returns (DeployContractReply) {
    option (google.api.http) = {
      post: "/v1/deployContract"
      body: "*"
    };
  }

  rpc GetBztOwnerAddress (GetBztOwnerAddressRequest) returns (GetBztOwnerAddressReply) {
    option (google.api.http) = {
      post: "/v1/getBztOwnerAddress"
      body: "*"
    };
  }

  rpc GetBztVersion (GetBztVersionRequest) returns (GetBztVersionReply) {
    option (google.api.http) = {
      get: "/bzt/version"
    };
  }

  rpc GetConfigs (GetConfigsRequest) returns (GetConfigsReply) {
    option (google.api.http) = {
      post: "/v1/getConfigs"
      body: "*"
    };
  }

}

// The request message containing the user's name.
message HelloRequest {
  string name = 1;
  uint64 value = 2;
}

// The response message containing the greetings
message HelloReply {
  string message = 1;
}

message GetLoginMessageRequest {
  string address = 1;
}

// The response message containing the greetings
message GetLoginMessageReply {
  string metadata = 1;
  string hash = 2;
}
message BindWalletRequest {
  string address = 1;
}

// The response message containing the greetings
message BindWalletReply {
  string uid= 1;
  string metadata = 2;
  string hash = 3;
}

message LoginRequest {
  string uid = 1;
  string signature = 2;
  string address = 3;
}

// The response message containing the greetings
message LoginReply {
  string token = 1;
}

message WalletBalanceRequest {
  string address = 1;
}

message TokenBalance {
  string symbol = 1;
  string balance = 2;
}

message WalletBalanceReply {
  repeated TokenBalance tokens = 1;
}

message MarketConditionRequest {
  string symbol = 1;
  int64 start_time = 2;
  int64 end_time = 3;
}

message MarketPrice {
  string price = 1;
  uint64 time = 2;
}

message MarketConditionReply {
  repeated MarketPrice prices = 1;
}


message OpenOrderRequest {
  string address = 1;
  uint64 timestamp = 2;
  string symbol = 3;
}

// The response message containing the greetings
message OpenOrderReply {
  string orderId = 1;
  uint64 status = 2;
}

message CloseOrderRequest {
  string address = 1;
  uint64 timestamp = 2;
  string symbol = 3;
  string orderId = 4;
}

// The response message containing the greetings
message CloseOrderReply {
  string tx = 1;
}

message GetAirdropRequest {
  string address = 1;
  uint64 isClaims = 2;
  string symbol = 3;
}

// The response message containing the greetings
message GetAirdropReply {
  string status = 1;
  string value = 2;
  string txHash = 3;
}

message HealthCheckRequest {}

message HealthCheckReply {
  string status = 1; // "ok" 或 "not ok"
}

message OrderTradeRequest {
  string address = 1;
  int64 page = 2;
  int64 pageSize = 3;
}

// The response message containing the greetings
message OrderTradeReply {
  repeated OrderDetails result = 1;
}

message OrderDetails {
  string orderId = 1;
  string symbol = 2;
  string openedPrice = 3;
  string closePrice = 4;
  string profitLoss = 5;
  string amount = 6;
  string usersAddr = 7;
  uint64 isClosed = 8;
  uint64 orderStartTime = 9;
  uint64 orderEndTime = 10;
  string openTxHash = 11;
  string closeTxHash = 12;
}

message AirdropTradeRequest {
  string addr = 1;
}

// The response message containing the greetings
message AirdropTradeReply {
  repeated AirdropDetails result = 1;
}

message AirdropDetails {
  string usersAddr = 1;
  string amount = 2;
  string symbol = 3;
  string times = 4;
  string txHash = 5;
}

message BztDappRequest {}

message BztDappReply {
  int64 code = 1;
  string message = 2;
  repeated DataDetails data = 3;
}

message DataDetails {
  int64 appId = 1;
  string dappIcon = 2;
  string dappIntroduce = 3;
  string dappName = 4;
  string dappUrl = 5;
}

message DeployContractRequest {}

// The response message containing the greetings
message DeployContractReply {
  string txHash = 1;
}


message GetBztOwnerAddressRequest {}

// The response message containing the greetings
message GetBztOwnerAddressReply {
  string bztAddr = 1;
}

message GetBztVersionRequest {}

// The response message containing the greetings
message GetBztVersionReply {
  string version = 1;
  string build_time = 2;
}

message GetConfigsRequest {}

// The response message containing the greetings
message GetConfigsReply {
  uint64 chainId = 1;
  string bztContractAddress = 2;
  string dusdtContractAddress = 3;
}
